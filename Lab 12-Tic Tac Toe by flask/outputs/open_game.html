<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open Flask App</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif; padding:24px; background:#0b0b12; color:#fff;}
    .card{max-width:720px; margin:0 auto; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:18px;}
    button{padding:10px 14px; border:none; border-radius:10px; background:#00ffcc; color:#071015; font-weight:700; cursor:pointer;}
    code{background:rgba(255,255,255,.08); padding:2px 6px; border-radius:8px;}
  </style>
</head>
<body>
  <div class="card">
    <h2>Open Game</h2>
    <p>To start the Flask server and open the game UI, double-click <b>open_game.bat</b> in this <code>outputs/</code> folder.</p>
    <p>If your browser does not open automatically, open:</p>
    <p><code>http://127.0.0.1:5000/</code></p>
    <p>
      <button onclick="window.open('http://127.0.0.1:5000/','_blank')">Open in Browser</button>
    </p>
  </div>
</body>
</html>
